
[TASK]
duration_in_days = 168
print_interval = 1
verbose = Yes
model = RumourModelInfo
save_node_states = No
output_dir = ../data/output/model

[GRAPH]
type = simple
edges = ../data/m-input/higgs-twitter/higgs_edges.csv.gz
file = ../data/m-input/higgs-twitter/higgs_simple.pickle

[MODEL]
lambda0=0.001
scale=1.0
I_duration=48
t_event=72
event_boost=0.01
decay=0.06       
init_I=12

[OUTPUT_ID]
id = MODEL:beta,MODEL:scale,MODEL:I_duration,MODEL:t_event,MODEL:decay

