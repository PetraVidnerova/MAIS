[TASK]
duration_in_days = 168
print_interval = 1
verbose = Yes
model = RumourModel
save_node_states = No
output_dir = ../data/output/model

[GRAPH]
type = simple
edges = ../data/m-input/higgs-twitter/higgs_edges.csv.gz
file = ../data/m-input/higgs-twitter/higgs_simple.pickle

[MODEL]
beta=0.1;0.25;0.5;0.75;1.0
scale=5.0;10.0
I_duration=48;96
init_I=13

[OUTPUT_ID]
id = MODEL:beta,MODEL:scale,MODEL:I_duration

